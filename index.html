<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
}
.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px;
    border-radius: 12px;
}
button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}
input {
    padding: 10px;
    margin: 5px;
}
.container {
    width: 900px;
    margin: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>Dashboard</h1>

<div class="card">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<div class="card">
Balance: $<span id="bal">0</span>
</div>

<div class="card" id="adminPanel" style="display:none;">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<button onclick="addProduct()">Add Product</button>

<h3>Add Balance</h3>
<input id="targetUser" placeholder="Username">
<input id="amount" placeholder="Amount">
<button onclick="addBalance()">Add Balance</button>
</div>

<div class="card">
<h3>Products</h3>
<div id="products"></div>
</div>

<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>

</div>

<script>

let currentUser = "";
let isAdmin = false;

async function login() {
    const res = await fetch("http://localhost:5000/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });

    const data = await res.json();

    if (data.message !== "Login success") {
        alert(data.message);
        return;
    }

    currentUser = data.username;
    isAdmin = data.isAdmin;

    document.getElementById("bal").innerText = data.balance;

    if (isAdmin) {
        adminPanel.style.display = "block";
    }

    loadProducts();
    loadUser();
}

async function register() {
    const res = await fetch("http://localhost:5000/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });

    const data = await res.json();
    alert(data.message);
}

async function loadProducts() {
    const res = await fetch("http://localhost:5000/products");
    const products = await res.json();

    productsDiv.innerHTML = "";

    products.forEach(p => {
        productsDiv.innerHTML += `
        <div class="card">
            ${p.name} - $${p.price}
            <button onclick="buy('${p._id}')">Buy</button>
        </div>`;
    });
}

async function addProduct() {
    const keys = prompt("Enter keys separated by commas");

    const res = await fetch("http://localhost:5000/add-product", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:pname.value,
            price:pprice.value,
            keys:keys,
            isAdmin:true
        })
    });

    const data = await res.json();
    alert(data.message);

    loadProducts();
}

async function addBalance() {
    const res = await fetch("http://localhost:5000/add-balance", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            adminUser:currentUser,
            adminPass:pass.value,
            targetUser:targetUser.value,
            amount:amount.value
        })
    });

    const data = await res.json();
    alert(data.message);
}

async function buy(id) {
    const res = await fetch("http://localhost:5000/order", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            productId:id,
            username:currentUser,
            isAdmin
        })
    });

    const data = await res.json();

    if (data.key) {
        alert("Your key: " + data.key);
    } else {
        alert(data.message);
    }

    loadUser();
}

async function loadUser() {
    if (isAdmin) return;

    const res = await fetch("http://localhost:5000/user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ username: currentUser })
    });

    const user = await res.json();

    bal.innerText = user.balance;

    orders.innerHTML = "";

    user.orders.forEach(o => {
        orders.innerHTML += `
        <div class="card">
            ${o.name} - $${o.price}<br>
            🔑 ${o.key}<br>
            ${o.date}
        </div>`;
    });
}

</script>

</body>
</html>
