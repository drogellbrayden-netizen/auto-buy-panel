<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
}

.sidebar{
  width:200px;
  background:#11172a;
  height:100vh;
  padding:20px;
}

.main{
  flex:1;
  padding:40px;
}

.card{
  background:#141a2a;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  background:#4c6fff;
  border:none;
  color:white;
}
</style>

</head>

<body>

<div class="sidebar">
  <a href="/products.html">Products</a>
</div>

<div class="main">

<div id="loginBox" class="card">
  <h2>Admin Login</h2>
  <input id="user">
  <input id="pass" type="password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<div class="card">
  <h3>Add Balance</h3>
  <input id="u2" placeholder="Username">
  <input id="amt" placeholder="Amount">
  <button onclick="addBalance()">Add</button>
</div>

<div class="card">
  <h3>Create Product</h3>
  <input id="pname" placeholder="Name">
  <input id="price" placeholder="Price">
  <button onclick="createProduct()">Create</button>
</div>

<div class="card">
  <h3>Add Key</h3>
  <input id="pid" placeholder="Product ID">
  <input id="key" placeholder="Key">
  <button onclick="addKey()">Add Key</button>
</div>

</div>

</div>

<script>
async function login(){
  const res = await fetch("/admin/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  const data = await res.json();

  if(data.success){
    loginBox.style.display="none";
    panel.style.display="block";
  } else {
    alert(data.error);
  }
}

async function addBalance(){
  await fetch("/admin/add-balance",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u2.value,
      amount:Number(amt.value)
    })
  });
  alert("Done");
}

async function createProduct(){
  await fetch("/admin/create-product",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:pname.value,
      price:Number(price.value)
    })
  });
  alert("Product Created");
}

async function addKey(){
  await fetch("/admin/add-key",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      productId:pid.value,
      key:key.value
    })
  });
  alert("Key Added");
}
</script>

</body>
</html>
