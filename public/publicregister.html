<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#141a2a;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input,button{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
}

button{
  background:#4c6fff;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <h2>Register</h2>

  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">

  <button onclick="reg()">Create Account</button>
</div>

<script>
async function reg(){
  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      password:p.value
    })
  });

  alert("Account created!");
  window.location="/login.html";
}
</script>

</body>
</html>
