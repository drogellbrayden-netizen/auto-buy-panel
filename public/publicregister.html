<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#141a2a;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#4c6fff;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#3a56d6;
}

p{
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}
</style>

</head>

<body>

<div class="card">
  <h2>Create Account</h2>

  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">

  <button onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<script>
async function register(){
  const res = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      password:p.value
    })
  });

  const data = await res.json();

  if(data.success){
    msg.innerText = "Account created!";
    msg.style.color = "lightgreen";

    setTimeout(()=>{
      window.location = "/login.html";
    },1000);

  } else {
    msg.innerText = data.error || "Error";
    msg.style.color = "red";
  }
}
</script>

</body>
</html>
