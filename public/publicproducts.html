<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
}

.sidebar{
  width:200px;
  background:#11172a;
  height:100vh;
  padding:20px;
}

.sidebar a{
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
}

.main{
  flex:1;
  padding:20px;
}

.card{
  background:#141a2a;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

button{
  padding:10px;
  background:#4c6fff;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="sidebar">
  <a href="/login.html">Login</a>
  <a href="/register.html">Register</a>
  <a href="/products.html">Products</a>
  <a href="/admin.html">Admin</a>
</div>

<div class="main">

<h2 id="bal">Balance: $0</h2>

<h1>Products</h1>
<div id="list"></div>

</div>

<script>
const userId = localStorage.getItem("userId");

async function loadBalance(){
  const res = await fetch("/balance/" + userId);
  const data = await res.json();
  document.getElementById("bal").innerText = "Balance: $" + data.balance;
}

async function loadProducts(){
  const res = await fetch("/products");
  const products = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  products.forEach(p=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="buy('${p._id}')">Buy</button>
      </div>
    `;
  });
}

async function buy(id){
  const res = await fetch("/buy",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ userId, productId:id })
  });

  const data = await res.json();

  if(data.success){
    alert("Key: " + data.key);
    loadBalance();
  } else {
    alert(data.error);
  }
}

loadBalance();
loadProducts();
</script>

</body>
</html>
