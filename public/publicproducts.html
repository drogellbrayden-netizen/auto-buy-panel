<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:24px;
}

.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.card{
  background:#141a2a;
  padding:20px;
  border-radius:12px;
  width:200px;
  text-align:center;
}

.price{
  margin:10px 0;
  font-weight:bold;
}

button{
  padding:8px 12px;
  background:#4c6fff;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#3a56d6;
}
</style>

</head>

<body>

<div class="header">🛍️ Products</div>

<div class="grid">

  <div class="card">
    <h3>Basic Bot</h3>
    <div class="price">$10</div>
    <button onclick="buy('Basic Bot')">Buy</button>
  </div>

  <div class="card">
    <h3>Pro Bot</h3>
    <div class="price">$25</div>
    <button onclick="buy('Pro Bot')">Buy</button>
  </div>

  <div class="card">
    <h3>Ultra Bot</h3>
    <div class="price">$50</div>
    <button onclick="buy('Ultra Bot')">Buy</button>
  </div>

</div>

<script>
function buy(item){
  alert(item + " purchased (demo)");
}
</script>

</body>
</html>
