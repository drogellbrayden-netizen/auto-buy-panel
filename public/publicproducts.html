<script>
async function buy(name, price){
  const userId = localStorage.getItem("userId");

  if(!userId){
    alert("Login first!");
    return;
  }

  const res = await fetch("/buy",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      userId,
      product:name,
      price
    })
  });

  const data = await res.json();

  if(data.success){
    alert("✅ Key: " + data.key + "\nBalance: $" + data.newBalance);
  } else {
    alert(data.error);
  }
}
</script>
