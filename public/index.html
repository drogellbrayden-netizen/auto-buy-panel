<!DOCTYPE html>
<html>
<head>
<title>Nexaa Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#11172a;
  height:100vh;
  padding:20px;
  box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  margin:12px 0;
  color:white;
  text-decoration:none;
  padding:10px;
  border-radius:8px;
  transition:0.2s;
}

.sidebar a:hover{
  background:#1a2240;
}

/* MAIN */
.main{
  flex:1;
  padding:50px;
}

/* CARD */
.card{
  background:#141a2a;
  padding:25px;
  border-radius:12px;
  max-width:400px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 Nexaa</h2>

  <a href="/login.html">Login</a>
  <a href="/register.html">Register</a>
  <a href="/products.html">Products</a>
  <a href="/admin.html">Admin</a>
</div>

<div class="main">
  <div class="card">
    <h1>Welcome</h1>
    <p>Select a page from the sidebar.</p>
  </div>
</div>

</body>
</html>
