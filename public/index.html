<!DOCTYPE html>
<html>
<head>
  <title>Auto Buy Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .box {
      margin: 20px auto;
      width: 300px;
      padding: 20px;
      background: #1e293b;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <h1>Auto Buy Panel 🚀</h1>

  <div class="box">
    <h2>Register</h2>
    <input id="ruser" placeholder="username">
    <input id="rpass" type="password" placeholder="password">
    <button onclick="register()">Register</button>
  </div>

  <div class="box">
    <h2>Login</h2>
    <input id="luser" placeholder="username">
    <input id="lpass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
  </div>

  <p id="msg"></p>

  <script>
    async function register() {
      const res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: ruser.value,
          password: rpass.value
        })
      });

      msg.innerText = await res.text();
    }

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: luser.value,
          password: lpass.value
        })
      });

      const data = await res.json();

      if (data.token) {
        msg.innerText = "Login success 🚀";

        if (data.admin) {
          msg.innerText += " (ADMIN)";
        }
      } else {
        msg.innerText = await res.text();
      }
    }
  </script>
</body>
</html>
