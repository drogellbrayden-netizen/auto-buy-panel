<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.sidebar{
  width:200px;
  height:100vh;
  background:#141a2a;
  position:fixed;
  padding:20px;
}

.main{
  margin-left:220px;
  padding:20px;
}

.card{
  background:#1c2336;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>Nexaa</h3>
  <a href="/products.html" style="color:white;display:block;margin-top:20px;">Products</a>
  <a href="/admin.html" style="color:white;display:block;margin-top:10px;">Admin</a>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div class="card">
    <h3 id="name">Loading...</h3>
    <p>Balance: $<span id="bal">0</span></p>
  </div>
</div>

<script>
async function load(){
  const id = localStorage.getItem("userId");

  const res = await fetch("/me/" + id);
  const data = await res.json();

  document.getElementById("name").innerText = data.username;
  document.getElementById("bal").innerText = data.balance;
}

load();
</script>

</body>
</html>
